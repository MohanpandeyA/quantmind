name: QuantMind CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Python unit tests (453 tests, ~2s)
  # ─────────────────────────────────────────────────────────────
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          cd backend
          python -m pytest tests/unit/ -v --tb=short --cov=. --cov-report=term-missing
        env:
          # Minimal env vars needed for tests (no real keys required)
          GROQ_API_KEY: test_key_not_used_in_unit_tests
          NEWS_API_KEY: test_key_not_used_in_unit_tests
          CHROMA_PERSIST_DIR: ./data/chroma
          FASTAPI_HOST: 0.0.0.0
          FASTAPI_PORT: "8000"
          DEBUG: "false"
          LOG_LEVEL: WARNING

  # ─────────────────────────────────────────────────────────────
  # Job 2: Python code quality (black + isort)
  # ─────────────────────────────────────────────────────────────
  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install black>=24.4.0 isort>=5.13.0

      - name: Check black formatting
        run: |
          cd backend
          black --check --diff .

      - name: Check isort import ordering
        run: |
          cd backend
          isort --check --diff .

  # ─────────────────────────────────────────────────────────────
  # Job 3: Frontend build check
  # ─────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          cd client
          npm ci

      - name: Build production bundle
        run: |
          cd client
          npm run build
        env:
          # Point to a placeholder URL for build-time check
          VITE_API_URL: https://quantmind-backend.onrender.com

  # ─────────────────────────────────────────────────────────────
  # Job 4: Docker build validation (backend)
  # ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    # Only run on pushes to main (not every PR to save CI minutes)
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false   # Just validate the build, don't push
          tags: quantmind-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
